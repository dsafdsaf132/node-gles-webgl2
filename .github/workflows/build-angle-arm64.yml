name: Build ANGLE ARM64
run-name: Build ANGLE ARM64 ${{ inputs.archive_version }}

on:
  workflow_dispatch:
    inputs:
      archive_version:
        description: "Archive version used in angle-<version>-<platform>-arm64"
        required: true
        default: "3729"
        type: string
      angle_ref:
        description: "ANGLE git ref to build"
        required: true
        default: "chromium/3729"
        type: string
      release_tag:
        description: "GitHub Release tag for ANGLE assets"
        required: true
        default: "angle-arm64-3729"
        type: string

permissions:
  contents: write

jobs:
  build-angle:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-15
          - name: windows-arm64
            runner: windows-11-arm
    defaults:
      run:
        shell: bash
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"

    steps:
      - name: Check out node-gles-webgl2
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install packaging dependencies
        run: npm install --ignore-scripts

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            git \
            libasound2-dev \
            libdbus-1-dev \
            libdrm-dev \
            libgbm-dev \
            libgtk-3-dev \
            libnss3-dev \
            libpci-dev \
            libpulse-dev \
            libudev-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxtst-dev \
            ninja-build \
            pkg-config \
            python3 \
            xz-utils

      - name: Normalize bash paths
        run: |
          temp_dir="$RUNNER_TEMP"
          if command -v cygpath >/dev/null 2>&1; then
            temp_dir="$(cygpath -u "$RUNNER_TEMP")"
          fi
          printf 'RUNNER_TEMP_UNIX=%s\n' "$temp_dir" >> "$GITHUB_ENV"

      - name: Install depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$RUNNER_TEMP_UNIX/depot_tools"
          echo "$RUNNER_TEMP_UNIX/depot_tools" >> "$GITHUB_PATH"

      - name: Fetch ANGLE
        run: |
          set -euo pipefail
          git clone https://chromium.googlesource.com/angle/angle "$RUNNER_TEMP_UNIX/angle"
          cd "$RUNNER_TEMP_UNIX/angle"
          git checkout "${{ inputs.angle_ref }}"
          python scripts/bootstrap.py
          gclient sync --no-history --shallow --jobs 8

      - name: Generate ANGLE build files
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP_UNIX/angle"
          gn_args='is_debug=false target_cpu="arm64" is_component_build=false symbol_level=0 treat_warnings_as_errors=false'
          if [ "$RUNNER_OS" = "Windows" ]; then
            gn_args="$gn_args is_clang=false"
          fi
          gn gen out/Release --args="$gn_args"

      - name: Build ANGLE libraries
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP_UNIX/angle"
          autoninja -C out/Release libEGL libGLESv2

      - name: Package ANGLE archive
        id: package
        run: |
          set -euo pipefail
          archive_path="$(node scripts/package-angle.js \
            --source "$RUNNER_TEMP_UNIX/angle" \
            --version "${{ inputs.archive_version }}" \
            --out-dir "$RUNNER_TEMP_UNIX/angle-artifacts")"
          echo "archive_path=${archive_path}" >> "$GITHUB_OUTPUT"
          echo "archive_name=$(basename "$archive_path")" >> "$GITHUB_OUTPUT"

      - name: Upload ANGLE archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  publish-assets:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build-angle
    if: always()
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download ANGLE archive artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: angle-*
          path: angle-artifacts
          merge-multiple: true

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(angle-artifacts/angle-*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No ANGLE archives were produced"
            exit 1
          fi

          tag="${{ inputs.release_tag }}"
          notes="$(cat <<EOF
          ANGLE ARM64 archives for node-gles-webgl2.

          ANGLE ref: ${{ inputs.angle_ref }}
          Archive version: ${{ inputs.archive_version }}

          Use with:
          NODE_GLES_ANGLE_VERSION=${{ inputs.archive_version }}
          NODE_GLES_ANGLE_BASE_URI=https://github.com/${{ github.repository }}/releases/download/${tag}/
          EOF
          )"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --notes "$notes"
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --notes "$notes"
          fi
          gh release upload "$tag" "${assets[@]}" --clobber

name: Publish
run-name: ${{ startsWith(inputs.version, 'v') && format('Publish {0}', inputs.version) || format('Publish v{0}', inputs.version) }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm version to publish, for example 0.1.4 or v0.1.4"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Set up npm for trusted publishing
        run: npm install -g npm@latest

      - name: Prepare release version
        id: release
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "::error::Publish workflow must be run from master, got ${GITHUB_REF_NAME}"
            exit 1
          fi

          version="${INPUT_VERSION}"
          version="${version#v}"
          tag="v${version}"

          if ! node -e 'const version = process.argv[1]; if (!/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(version)) process.exit(1)' "$version"; then
            echo "::error::Invalid semver version: ${INPUT_VERSION}"
            exit 1
          fi

          package_name="$(node -p "require('./package.json').name")"
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_sha="$(git rev-list -n 1 "${tag}")"
            head_sha="$(git rev-parse HEAD)"
            if [ "${tag_sha}" != "${head_sha}" ]; then
              echo "::error::Git tag ${tag} exists at ${tag_sha}, but workflow HEAD is ${head_sha}"
              exit 1
            fi
            tag_version="$(git show "${tag}:package.json" | node -e "let input = ''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).version));")"
            if [ "${tag_version}" != "${version}" ]; then
              echo "::error::Git tag ${tag} exists, but its package.json version is ${tag_version}"
              exit 1
            fi
            echo "Git tag ${tag} already exists at ${tag_sha}; current workflow HEAD is ${head_sha}"
            tag_exists=true
          else
            tag_exists=false
          fi

          if npm view "${package_name}@${version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${package_name}@${version} is already published to npm"
            npm_published=true
          else
            npm_published=false
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >> "$GITHUB_OUTPUT"
          echo "npm_published=${npm_published}" >> "$GITHUB_OUTPUT"

      - name: Commit release version
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "${{ steps.release.outputs.tag_exists }}" = "true" ]; then
            echo "Reusing existing release tag ${{ steps.release.outputs.tag }}"
          else
            current_version="$(node -p "require('./package.json').version")"
            if [ "${current_version}" != "${{ steps.release.outputs.version }}" ]; then
              npm version "${{ steps.release.outputs.version }}" --no-git-tag-version

              git add package.json
              for lockfile in package-lock.json npm-shrinkwrap.json; do
                if [ -f "$lockfile" ]; then
                  git add "$lockfile"
                fi
              done

              if git diff --cached --quiet; then
                echo "::error::No package version changes were produced"
                exit 1
              fi

              git commit -m "chore(release): ${{ steps.release.outputs.tag }}"
              git push origin "HEAD:${{ github.ref_name }}"
            else
              echo "package.json is already at ${{ steps.release.outputs.version }}"
            fi

            git tag "${{ steps.release.outputs.tag }}"
            git push origin "${{ steps.release.outputs.tag }}"
          fi

      - name: Check out existing release tag
        if: steps.release.outputs.tag_exists == 'true'
        run: git checkout --detach "${{ steps.release.outputs.tag }}"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build package files
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        if: steps.release.outputs.npm_published != 'true'
        run: npm publish --access public

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://npm.pkg.github.com
          scope: "@dsafdsaf132"

      - name: Check GitHub Package version
        id: github_package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          package="@dsafdsaf132/node-gles-webgl2@${{ steps.release.outputs.version }}"
          if npm view "${package}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${package} is already published to GitHub Packages"
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare GitHub Packages metadata
        if: steps.github_package.outputs.published != 'true'
        run: |
          npm pkg set name=@dsafdsaf132/node-gles-webgl2
          npm pkg set publishConfig.registry=https://npm.pkg.github.com

      - name: Verify GitHub Packages contents
        if: steps.github_package.outputs.published != 'true'
        run: npm pack --dry-run

      - name: Publish to GitHub Packages
        if: steps.github_package.outputs.published != 'true'
        run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${{ steps.release.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "GitHub Release ${tag} already exists"
          else
            gh release create "${tag}" \
              --title "${tag}" \
              --notes "Release ${tag}"
          fi

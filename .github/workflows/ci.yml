name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: read

jobs:
  build:
    name: Build and test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-15
          - name: macos-x64
            runner: macos-15-intel
            runtime_smoke: false
          - name: windows-x64
            runner: windows-latest
          - name: windows-arm64
            runner: windows-11-arm

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 libx11-dev libxext-dev xvfb

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download ANGLE and build addon
        env:
          NODE_GLES_GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/install.js

      - name: Stage ANGLE DLLs for Windows smoke tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          Copy-Item deps\angle\out\Release\*.dll -Destination $nodeDir -Force

      - name: Build TypeScript
        run: npm run build

      - name: Smoke test WebGL2 bindings on Linux
        if: runner.os == 'Linux' && matrix.runtime_smoke != false
        run: xvfb-run -a npm test

      - name: Smoke test three.js integration on Linux
        if: runner.os == 'Linux' && matrix.runtime_smoke != false
        run: xvfb-run -a npm run test:three

      - name: Smoke test twgl.js integration on Linux
        if: runner.os == 'Linux' && matrix.runtime_smoke != false
        run: xvfb-run -a npm run test:twgl

      - name: Smoke test WebGL2 bindings
        if: runner.os != 'Linux' && matrix.runtime_smoke != false
        run: npm test

      - name: Smoke test three.js integration
        if: runner.os != 'Linux' && matrix.runtime_smoke != false
        run: npm run test:three

      - name: Smoke test twgl.js integration
        if: runner.os != 'Linux' && matrix.runtime_smoke != false
        run: npm run test:twgl

      - name: Skip runtime smoke
        if: matrix.runtime_smoke == false
        run: |
          echo "Build and link are validated for ${{ matrix.name }}."
          echo "Runtime smoke is skipped because ANGLE EGL display creation is not reliable on GitHub-hosted macOS x64 runners."

  wsl-smoke:
    name: Experimental WSL smoke
    runs-on: windows-2025
    # Keep this non-blocking until hosted-runner WSL runtime behavior is proven.
    continue-on-error: true

    steps:
      - name: Set up WSL
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          update: 'true'
          additional-packages: >
            build-essential
            python3
            libx11-dev
            libxext-dev
            xvfb
            nodejs
            npm

      - name: Check out
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install dependencies under WSL
        shell: wsl-bash {0}
        run: npm install --ignore-scripts

      - name: Download ANGLE and build addon under WSL
        shell: wsl-bash {0}
        env:
          NODE_GLES_GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/install.js

      - name: Build TypeScript under WSL
        shell: wsl-bash {0}
        run: npm run build

      - name: Smoke test WebGL2 bindings under WSL
        shell: wsl-bash {0}
        run: xvfb-run -a npm test

      - name: Smoke test three.js integration under WSL
        shell: wsl-bash {0}
        run: xvfb-run -a npm run test:three

      - name: Smoke test twgl.js integration under WSL
        shell: wsl-bash {0}
        run: xvfb-run -a npm run test:twgl

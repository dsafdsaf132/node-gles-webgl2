name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-x64:
    name: Build and test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: macos-x64
            runner: macos-15-intel
          - name: windows-x64
            runner: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev xvfb

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download ANGLE and build addon
        run: node scripts/install.js

      - name: Stage ANGLE DLLs for Windows smoke tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          Copy-Item deps\angle\out\Release\*.dll -Destination $nodeDir -Force

      - name: Build TypeScript
        run: npm run build

      - name: Smoke test WebGL2 bindings on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Smoke test WebGL2 bindings
        if: runner.os != 'Linux'
        run: npm test

  build-arm64:
    name: Build and test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-arm64
            runner: ubuntu-24.04-arm
          - name: macos-arm64
            runner: macos-15
          - name: windows-arm64
            runner: windows-11-arm
    defaults:
      run:
        shell: bash
    env:
      ANGLE_REF: chromium/3729
      ANGLE_ARCHIVE_VERSION: "3729"
      NODE_GLES_ALLOW_LEGACY_ANGLE_CACHE: "1"
      DEPOT_TOOLS_WIN_TOOLCHAIN: "0"

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            curl \
            git \
            libasound2-dev \
            libdbus-1-dev \
            libdrm-dev \
            libgbm-dev \
            libgtk-3-dev \
            libnss3-dev \
            libpci-dev \
            libpulse-dev \
            libudev-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxdamage-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxrender-dev \
            libxtst-dev \
            ninja-build \
            pkg-config \
            python3 \
            xz-utils

      - name: Normalize bash paths
        run: |
          temp_dir="$RUNNER_TEMP"
          if command -v cygpath >/dev/null 2>&1; then
            temp_dir="$(cygpath -u "$RUNNER_TEMP")"
          fi
          printf 'RUNNER_TEMP_UNIX=%s\n' "$temp_dir" >> "$GITHUB_ENV"

      - name: Install depot_tools
        run: |
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git "$RUNNER_TEMP_UNIX/depot_tools"
          echo "$RUNNER_TEMP_UNIX/depot_tools" >> "$GITHUB_PATH"

      - name: Fetch ANGLE
        run: |
          set -euo pipefail
          git clone https://chromium.googlesource.com/angle/angle "$RUNNER_TEMP_UNIX/angle"
          cd "$RUNNER_TEMP_UNIX/angle"
          git checkout "$ANGLE_REF"
          vpython scripts/bootstrap.py
          gclient sync --no-history --shallow --jobs 8

      - name: Generate ANGLE build files
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP_UNIX/angle"
          gn_args='is_debug=false target_cpu="arm64" is_component_build=false symbol_level=0 treat_warnings_as_errors=false'
          if [ "$RUNNER_OS" = "Windows" ]; then
            gn_args="$gn_args is_clang=false"
          fi
          gn gen out/Release --args="$gn_args"

      - name: Build ANGLE libraries
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP_UNIX/angle"
          autoninja -C out/Release libEGL libGLESv2

      - name: Stage ANGLE build
        run: |
          node scripts/package-angle.js \
            --source "$RUNNER_TEMP_UNIX/angle" \
            --version "$ANGLE_ARCHIVE_VERSION" \
            --out-dir "$RUNNER_TEMP_UNIX/angle-artifacts" \
            --install-dir deps/angle

      - name: Build native addon
        run: node scripts/install.js

      - name: Stage ANGLE DLLs for Windows smoke tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          Copy-Item deps\angle\out\Release\*.dll -Destination $nodeDir -Force

      - name: Build TypeScript
        run: npm run build

      - name: Smoke test WebGL2 bindings on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Smoke test WebGL2 bindings
        if: runner.os != 'Linux'
        run: npm test

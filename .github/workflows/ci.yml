name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-x64:
    name: Build and test (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
          - name: macos-x64
            runner: macos-15-intel
          - name: windows-x64
            runner: windows-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev xvfb

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Download ANGLE and build addon
        run: node scripts/install.js

      - name: Stage ANGLE DLLs for Windows smoke tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nodeDir = Split-Path -Parent (Get-Command node).Source
          Copy-Item deps\angle\out\Release\*.dll -Destination $nodeDir -Force

      - name: Build TypeScript
        run: npm run build

      - name: Smoke test WebGL2 bindings on Linux
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Smoke test WebGL2 bindings
        if: runner.os != 'Linux'
        run: npm test
